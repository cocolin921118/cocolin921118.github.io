<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>

        div {
            position: absolute;
            left: 0;
            width: 200px;
            height: 50px;
            background: #f00;
            animation-name: oxxo;
            animation-duration: 2s;
            animation-iteration-count: infinite;
        }

        @keyframes oxxo {
            from {
                left: 0;
                background: #0dcaf0;
            }
            to {
                left: 500px;
                background: #efe002;
                width: 300px;
                height: 100px;
            }

        }</style>

</head>
<body>

<div>

    aa

</div>

</body>
</html>
