<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>

        div {
            position: absolute;
            left: 0;
            width: 50px;
            height: 50px;
            background: #f00;
            animation-name: oxxo;
            animation-duration: 2s;
            animation-iteration-count: infinite;
        }

        @keyframes oxxo {

            0%{
                top:0px ;
                left:0px ;
            }

            25%{
                top:0px ;
                left:100px ;
            }

            50%{
                top:100px ;
                left:100px ;
            }

            75%{
                top:100px ;
                left:0px ;
            }

            100%{
                top:0px ;
                left:0px ;
            }

        }</style>

</head>
<body>

<div>

    aa

</div>

</body>
</html>
