<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>

        div {
            position: absolute;
            left: 0;
            width: 50px;
            height: 50px;
            animation-name: oxxo;
            animation-duration: 3s;
            animation-iteration-count: infinite;


        }


        @keyframes oxxo {
            from {
                left: 0;
                transform: rotate(0deg);
            }
            to {
                left: 1500px;
                transform: rotate(360deg);
                width: 300px;
                height: 50px;
            }

        }</style>

</head>
<body>

<div>

    <img src="img/cry_cat.png" height="202" width="202"/>
    <img src="img/cry_cat.png" height="202" width="202"/>
    <img src="img/cry_cat.png" height="202" width="202"/>
    <img src="img/cry_cat.png" height="202" width="202"/>




</div>

</body>
</html>
